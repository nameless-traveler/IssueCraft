<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 160" width="480" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1117"/>
      <stop offset="100%" style="stop-color:#161B22"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5A623"/>
      <stop offset="100%" style="stop-color:#E8850A"/>
    </linearGradient>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1C2333"/>
      <stop offset="100%" style="stop-color:#0D1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="480" height="160" fill="url(#bgGrad)" rx="12"/>

  <!-- Hexagon mark -->
  <polygon points="80,28 108,44 108,76 80,92 52,76 52,44" fill="url(#markGrad)" stroke="#F5A623" stroke-width="1.5"/>

  <!-- Inner hex glow ring -->
  <polygon points="80,34 103,47 103,73 80,86 57,73 57,47" fill="none" stroke="#F5A62322" stroke-width="1"/>

  <!-- Pencil body -->
  <rect x="72" y="44" width="6" height="24" rx="1" fill="#F5A623" transform="rotate(-35 80 60)"/>

  <!-- Pencil tip -->
  <polygon points="80,74 76,82 84,82" fill="#E8850A" transform="rotate(-35 80 60) translate(0 4)"/>

  <!-- Pencil eraser top -->
  <rect x="72" y="41" width="6" height="5" rx="1" fill="#C7965C" transform="rotate(-35 80 60)"/>

  <!-- Sparkle dots at tip -->
  <circle cx="96" cy="74" r="2.5" fill="#F5A623" filter="url(#glow)" opacity="0.9"/>
  <circle cx="103" cy="65" r="1.5" fill="#F5A623" opacity="0.6"/>
  <circle cx="99" cy="78" r="1" fill="#F5A623" opacity="0.4"/>

  <!-- Slash line — "rewriting" -->
  <line x1="55" y1="67" x2="65" y2="55" stroke="#F5A62355" stroke-width="1.5" stroke-dasharray="2,2"/>

  <!-- Wordmark: IssueCraft -->
  <text x="130" y="86" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="700" fill="#F0F6FF" letter-spacing="-1">IssueCraft</text>

  <!-- Tagline -->
  <text x="131" y="110" font-family="'Courier New', Courier, monospace" font-size="12" fill="#8B949E" letter-spacing="1.5">A SMARTER WAY TO WRITE GITHUB ISSUES</text>

  <!-- Accent underline -->
  <rect x="131" y="94" width="60" height="2" rx="1" fill="url(#amberGrad)"/>
</svg>
