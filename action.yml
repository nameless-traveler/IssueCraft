name: 'IssueCraft'
description: 'Improves GitHub issues by rewriting them into clear, structured reports for developers.'
author: 'nameless-traveler'

branding:
  icon: 'zap'
  color: 'purple'

inputs:
  ai-provider:
    description: 'AI provider to use: openai | gemini'
    required: false
    default: 'openai'

  openai-api-key:
    description: 'OpenAI API key for calling the LLM (optional if OPENAI_API_KEY env var is set)'
    required: false

  gemini-api-key:
    description: 'Gemini API key for calling the LLM (optional if GEMINI_API_KEY env var is set)'
    required: false

  github-token:
    description: 'GitHub token with issues: write permission'
    required: true
    default: ${{ github.token }}

  openai-model:
    description: 'OpenAI model to use for analysis'
    required: false
    default: 'gpt-4o-mini'

  gemini-model:
    description: 'Gemini model to use for analysis'
    required: false
    default: 'gemini-2.0-flash'

  log-level:
    description: 'Logging verbosity: debug | info | warn | error'
    required: false
    default: 'info'

runs:
  using: 'node20'
  main: 'src/main/runEnhancer.js'
